<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPERACIONES ARREGLOS</title>
<link rel="stylesheet" href="css/ejercicio14.css">
</head>
<body>
<div class="calculadora">
<h1>-Operaciones con Arreglos-</h1>
    <p>Ingresa varios números <strong>separados por comas</strong> para calcular las operaciones.</p>
<div class="formulas">
<label for="cadenaNumeros" class="centrado">INGRESAR NÚMEROS</label>
<input type="text" id="cadenaNumeros" placeholder="Ej: 10, 20, 30" required>
</div>     
<button id="btnCalcular" class="boton-accion">CALCULAR</button>  
<div class="grupo formulario">
<label for="numMayor" class="centrado">NÚMERO MAYOR</label>
<input type="text" id="numMayor" readonly placeholder="">
</div>
<div class="grupo formulario">
<label for="numMenor" class="centrado">NÚMERO MENOR</label>
<input type="text" id="numMenor" readonly placeholder="">
</div>
<div class="grupo formulario">
<label for="promedio" class="centrado">PROMEDIO</label>
<input type="text" id="promedio" readonly placeholder="">
</div>
</div>
<script src="js/ejercicio14.js"></script>
</body>
</html>
