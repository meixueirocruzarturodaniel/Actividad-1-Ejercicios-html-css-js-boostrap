<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANEJO DE ESTUDIANTES</title>
<link rel="stylesheet" href="css/ejercicio15.css">
</head>
<body>
<div class="calculadora">
<h1>-Control de Estudiantes-</h1>
<p>Ingresa los datos del estudiante para agregarlo a la lista y realizar los cálculos.</p>
<div class="formulas">
<label for="nombreEstudiante" class="centrado">NOMBRE DEL ESTUDIANTE</label>
<input type="text" id="nombreEstudiante" required>
</div>
<div class="formulas">
<label for="calificacionEstudiante" class="centrado">CALIFICACIÓN</label>
<input type="number" id="calificacionEstudiante" required>
</div>
<button id="btnAgregar" class="boton-accion">Agregar estudiante</button>
<button id="btnCalcular" class="boton-accion">Calcular</button>
<div class="grupo formulario">
<label for="promedioGral" class="centrado">CALIFICACIÓN PROMEDIO</label>
<input type="text" id="promedioGral" readonly placeholder="">
</div>
<div class="grupo formulario">
<label for="estMax" class="centrado">CALIFICACIÓN MÁS ALTA</label>
<input type="text" id="estMax" readonly placeholder="">
</div>
<div class="grupo formulario">
<label for="estMin" class="centrado">CALIFICACIÓN MÁS BAJA</label>
<input type="text" id="estMin" readonly placeholder="">
</div>
</div>
<script src="js/ejercicio15.js"></script>
</body>
</html>
