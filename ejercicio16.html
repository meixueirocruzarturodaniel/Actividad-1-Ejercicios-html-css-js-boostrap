<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Calculadora Casio JS</title>
<link rel="stylesheet" href="css/ejercicio16.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
<div class="casio-calculadora">
<div class="marca">CASIO</div>
<div class="pantalla-contenedor">
<input type="text" id="resultado" readonly placeholder="0">
</div>
<div class="entradas-contenedor">
<input type="text" id="numero1" placeholder="Número 1">
<input type="text" id="numero2" placeholder="Número 2">
</div>
<div class="botones-contenedor">
<button type="button" onclick="calcularOperacion('suma')">+</button>
<button type="button" onclick="calcularOperacion('resta')">-</button>
<button type="button" onclick="calcularOperacion('multiplicacion')">×</button>
<button type="button" class="btn-division" onclick="calcularOperacion('division')">÷</button>
</div>
</div>
<script src="js/ejercicio16.js"></script>
</body>
</html>
