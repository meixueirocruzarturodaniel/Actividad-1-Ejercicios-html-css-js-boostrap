<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de celcius a fahrenheit</title>
<link rel="stylesheet" href="css/ejercicio10.css">
</head>
<body>
<div class="calculadora">
<h1>-Conversor de Temperatura-</h1>
<p>Ingresa los grados <strong>Celsius</strong> para Convertir a <strong>Fahrenheit</strong></p>
<br>
<div class="formulas">
<label for="celsius" class="centrado">Grados Celsius (°C)</label>

<input type="number" id="celsius" required>
</div>
<button id="btnConvertir" class="boton-accion">Convertir</button>

<div class="grupo formulario">
<label for="fahrenheit">Grados Fahrenheit (°F)</label>
<input type="text" id="fahrenheit" readonly placeholder="Resultado aquí">
</div>
</div>
<script src="js/ejercicio10.js"></script>
</body>
</html>
